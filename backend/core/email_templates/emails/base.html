<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{% block title %}C Square Club{% endblock %}</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #ffffff; padding: 40px 20px; margin: 0; color: #111111;">
  <div style="max-width: 600px; margin: 0 auto; background: #ffffff;">
    
    <!-- Main Content Area -->
    <div style="font-size: 16px; line-height: 1.6; color: #333333;">
      {% block content %}
      {% endblock %}
    </div>

    <!-- Signature -->
    <div style="margin-top: 50px; padding-top: 30px; border-top: 1px solid #eeeeee;">
      <div style="font-family:Arial, sans-serif;color:#222">

        <p style="margin:0"><strong>Thanks &amp; Regards,</strong></p>

        <p style="margin:0; margin-top: 12px;">
        <strong>C Square Club</strong><br>
        <span style="font-size:13px;color:#555">
        The Coding and Technical Club of Chandigarh University
        </span>
        </p>

        <div style="margin-top:12px; display: flex; align-items: center;">
        <img src="{{ frontend_url }}/logo-black.png" width="80" alt="C Square Club" style="vertical-align: middle;">
        &nbsp;&nbsp;&nbsp;&nbsp;
        <img src="{{ frontend_url }}/CU%20Logo.gif" width="180" alt="Chandigarh University" style="vertical-align: middle;">
        </div>

        <hr style="border:none;border-top:1px solid #ccc;margin:16px 0">

        <p style="margin:0;font-size:14px">
        <strong>Learn • Compete • Build</strong>
        </p>

        <p style="margin:12px 0;font-size:14px; line-height: 2;">
        &#128222;
        <a href="https://wa.me/917494947018" style="color: #111; text-decoration: none;">
        +91 7494947018
        </a>
        &nbsp;&nbsp;&nbsp;
        &#9993;
        <a href="mailto:csquareclub@cumail.in" style="color: #111; text-decoration: none;">
        csquareclub@cumail.in
        </a>
        <br>
        &#128188;
        <a href="https://www.linkedin.com/company/csquare-club/" style="color: #111; text-decoration: none;">
        csquare-club
        </a>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        &#128247;
        <a href="https://www.instagram.com/csquare_club/" style="color: #111; text-decoration: none;">
        @csquare_club
        </a>
        </p>

      </div>
    </div>
    
  </div>
</body>
</html>
