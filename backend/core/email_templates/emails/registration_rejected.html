{% extends "emails/base.html" %}

{% block title %}Registration Update{% endblock %}

{% block content %}
<h2 style="color: #111; margin-top: 0; font-size: 24px;">Registration Update</h2>
<p style="color: #444;">Hi {{ full_name }}, we regret to inform you that your registration for <strong>{{ event_title }}</strong> was not approved.</p>

{% if reason %}
<div style="margin: 24px 0; padding: 16px; background-color: #f9f9f9; border-left: 4px solid #111; border-radius: 4px;">
  <p style="color: #444; margin: 0;"><strong>Reason:</strong> {{ reason }}</p>
</div>
{% endif %}
{% endblock %}
