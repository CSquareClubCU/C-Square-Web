<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- Diamond mark: 4 rotated squares arranged around a center circle with a ring -->
  <!-- The mark is a diamond shape made of 4 "petals" with a circular crosshair in center -->
  
  <!-- Transform the whole mark to center it -->
  <g transform="translate(100,118)">
    <!-- Four diamond-shaped lobes, rotated 45 degrees -->
    <!-- Top lobe -->
    <rect x="-22" y="-72" width="44" height="44" rx="3" transform="rotate(45 0 -50)" fill="#111111"/>
    <!-- Right lobe -->
    <rect x="28" y="-22" width="44" height="44" rx="3" transform="rotate(45 50 0)" fill="#111111"/>
    <!-- Bottom lobe -->
    <rect x="-22" y="28" width="44" height="44" rx="3" transform="rotate(45 0 50)" fill="#111111"/>
    <!-- Left lobe -->
    <rect x="-72" y="-22" width="44" height="44" rx="3" transform="rotate(45 -50 0)" fill="#111111"/>
    
    <!-- Center outer ring (white cutout effect via white circle, then black ring, then white inner) -->
    <!-- Outer dark ring -->
    <circle cx="0" cy="0" r="28" fill="#111111"/>
    <!-- White ring gap -->
    <circle cx="0" cy="0" r="22" fill="white"/>
    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="14" fill="#111111"/>
    
    <!-- Thin white gap lines between lobes (cross cuts) -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="white" stroke-width="5"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="white" stroke-width="5"/>
  </g>
  
  <!-- "C SQUARE" text -->
  <text
    x="100"
    y="248"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="500"
    letter-spacing="6"
    fill="#111111"
  >C SQUARE</text>
</svg>
