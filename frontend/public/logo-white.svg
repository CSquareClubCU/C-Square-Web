<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- White version (for dark backgrounds) -->
  <g transform="translate(100,118)">
    <!-- Four diamond-shaped lobes -->
    <rect x="-22" y="-72" width="44" height="44" rx="3" transform="rotate(45 0 -50)" fill="white"/>
    <rect x="28" y="-22" width="44" height="44" rx="3" transform="rotate(45 50 0)" fill="white"/>
    <rect x="-22" y="28" width="44" height="44" rx="3" transform="rotate(45 0 50)" fill="white"/>
    <rect x="-72" y="-22" width="44" height="44" rx="3" transform="rotate(45 -50 0)" fill="white"/>
    
    <!-- Center rings -->
    <circle cx="0" cy="0" r="28" fill="white"/>
    <circle cx="0" cy="0" r="22" fill="#111111"/>
    <circle cx="0" cy="0" r="14" fill="white"/>
    
    <!-- Cross gap lines -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#111111" stroke-width="5"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#111111" stroke-width="5"/>
  </g>
  
  <!-- "C SQUARE" text in white -->
  <text
    x="100"
    y="248"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="500"
    letter-spacing="6"
    fill="white"
  >C SQUARE</text>
</svg>
